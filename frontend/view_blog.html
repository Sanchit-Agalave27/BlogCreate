{% extends "base.html" %}

{% block title %}
{{ blog.title }}
{% endblock %}

{% block content %}

<div class="view-card">

    <h1>{{ blog.title }}</h1>

    <div class="view-author">
        By {{ blog.author }}
    </div>

    <div class="blog-content">
        {{ blog.content }}
    </div>

    <div class="card-actions">

        <a href="/" class="read-btn">
            Back
        </a>

        <a href="/edit/{{ blog.id }}" class="edit-btn">
            Edit
        </a>

    </div>

</div>

{% endblock %}
