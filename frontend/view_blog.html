{% extends "base.html" %}

{% block title %}
{{ blog.title }}
{% endblock %}

{% block content %}

<div class="view-card">

    {% if blog.image_path %}

    <img
        src="/uploads/{{ blog.image_path }}"
        class="view-image">

    {% endif %}

    <h1>
        {{ blog.title }}
    </h1>

    <div class="view-meta">

        <span>
            ✍️ {{ blog.author }}
        </span>

        <span>
            📅 {{ blog.created_at.strftime("%d %b %Y") }}
        </span>

    </div>

    <div class="blog-content">

        {{ blog.content }}

    </div>

    <div class="card-actions">

        <a href="/"
           class="read-btn">

            Back

        </a>

        <a href="/edit/{{ blog.id }}"
           class="edit-btn">

            Edit

        </a>

    </div>

</div>

{% endblock %}
